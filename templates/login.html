<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streaks — Sign in</title>
<style>
  :root { --bg: #0d1117; --surface: #161b22; --border: #30363d; --text: #e6edf3; --text-muted: #7d8590; --accent: #388bfd; --radius: 6px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 40px; width: 360px; max-width: 95vw; }
  .login-title { font-size: 26px; font-weight: 700; margin-bottom: 6px; text-align: center; letter-spacing: -0.5px; }
  .login-title span { color: var(--accent); }
  .login-sub { color: var(--text-muted); text-align: center; margin-bottom: 32px; font-size: 13px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 10px 12px; font-size: 14px; outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--accent); }
  .btn-login { width: 100%; background: var(--accent); color: #fff; border: none; padding: 10px; border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 8px; transition: opacity 0.15s; }
  .btn-login:hover { opacity: 0.85; }
  .error-msg { color: #f85149; font-size: 13px; margin-top: 14px; text-align: center; display: none; padding: 8px; background: rgba(248,81,73,0.1); border-radius: var(--radius); }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-title">Str<span>ea</span>ks</div>
  <div class="login-sub">Sign in to track your habits</div>
  <form id="login-form" onsubmit="doLogin(event)">
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Sign in</button>
    <div class="error-msg" id="error-msg">Invalid username or password</div>
  </form>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const errEl = document.getElementById('error-msg');
  errEl.style.display = 'none';
  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    })
  });
  if (res.ok) {
    window.location = '/';
  } else {
    errEl.style.display = 'block';
  }
}
</script>
</body>
</html>
