<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Streaks</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text-muted: #7d8590; --accent: #388bfd; --radius: 6px;
    --red: #f85149; --green: #3fb950; --orange: #d29922;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; min-height: 100vh; }

  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 50; }
  .topbar-left a { color: var(--text-muted); text-decoration: none; font-size: 13px; transition: color 0.15s; }
  .topbar-left a:hover { color: var(--text); }
  .topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .user-badge { font-size: 12px; font-weight: 600; background: rgba(56,139,253,0.15); border: 1px solid rgba(56,139,253,0.3); color: var(--accent); padding: 3px 10px; border-radius: 20px; }

  /* Layout */
  .page { max-width: 1100px; margin: 0 auto; padding: 32px 28px; }

  /* Section card */
  .section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 28px; overflow: hidden; }
  .section-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-size: 15px; font-weight: 700; }
  .section-body { padding: 20px; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; padding: 0 12px 10px 0; border-bottom: 1px solid var(--border); }
  td { padding: 10px 12px 10px 0; border-bottom: 1px solid rgba(48,54,61,0.5); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .total-row td { font-weight: 700; border-top: 1px solid var(--border); border-bottom: none; padding-top: 12px; }

  /* Badges */
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-right: 4px; }
  .badge-admin { background: rgba(56,139,253,0.15); border: 1px solid rgba(56,139,253,0.3); color: var(--accent); }
  .badge-user { background: rgba(125,133,144,0.15); border: 1px solid rgba(125,133,144,0.3); color: var(--text-muted); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.15s; }
  .btn:hover { color: var(--text); border-color: var(--text-muted); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn-primary:hover { opacity: 0.85; color: #fff; }
  .btn-danger { border-color: var(--border); color: var(--text-muted); }
  .btn-danger:hover { border-color: var(--red); color: var(--red); }
  .btn-sm { padding: 3px 8px; font-size: 11px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Action group */
  .action-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

  /* Inline reset form */
  .reset-form { display: none; margin-top: 6px; }
  .reset-form.open { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .reset-form input { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 4px 8px; font-size: 12px; outline: none; width: 140px; }
  .reset-form input:focus { border-color: var(--accent); }

  /* Tab buttons */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .tab-btn { padding: 8px 16px; font-size: 13px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); cursor: pointer; transition: all 0.15s; margin-bottom: -1px; }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab-btn:hover:not(.active) { color: var(--text); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Bar chart */
  .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-bottom: 8px; }
  .bar-col { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; min-width: 0; }
  .bar-count { font-size: 9px; color: var(--text-muted); height: 12px; line-height: 12px; }
  .bar-fill { width: 100%; background: var(--accent); border-radius: 2px 2px 0 0; min-height: 2px; opacity: 0.8; transition: opacity 0.15s; }
  .bar-fill:hover { opacity: 1; }
  .bar-fill.zero { background: var(--border); opacity: 0.5; }
  .bar-label { font-size: 8px; color: var(--text-muted); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; margin-top: 2px; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: none; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px; width: 420px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .form-group input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); padding: 8px 12px; font-size: 14px; outline: none; transition: border-color 0.15s; }
  .form-group input:focus { border-color: var(--accent); }
  .checkbox-group { display: flex; gap: 10px; flex-wrap: wrap; }
  .check-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 12px; color: var(--text-muted); transition: all 0.15s; user-select: none; }
  .check-chip input { display: none; }
  .check-chip.checked { border-color: var(--accent); background: rgba(56,139,253,0.15); color: var(--text); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
  .error-text { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

  /* Loading */
  .loading { color: var(--text-muted); font-size: 13px; padding: 20px 0; }

  /* Per-user cells in stats table */
  .per-user-cell { font-size: 11px; color: var(--text-muted); }
  .per-user-item { display: inline-block; margin-right: 8px; }
  .per-user-item strong { color: var(--text); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left"><a href="/">&#8592; Back to app</a></div>
  <div class="topbar-title">&#9881;&#65039; Admin Panel</div>
  <div class="topbar-right">
    <span class="user-badge">{{ current_user }}</span>
  </div>
</div>

<div class="page">

  <!-- Section 1: Users -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Users</span>
      <button class="btn btn-primary btn-sm" onclick="openCreateModal()">+ Create User</button>
    </div>
    <div class="section-body">
      <div id="users-loading" class="loading">Loading...</div>
      <div id="users-table-wrap" style="display:none">
        <table id="users-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Groups</th>
              <th>Total entries</th>
              <th>Logins</th>
              <th>Last login</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Section 2: Entry statistics -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Entry Statistics</span>
    </div>
    <div class="section-body">
      <div id="stats-loading" class="loading">Loading...</div>
      <div id="stats-table-wrap" style="display:none">
        <table id="stats-table">
          <thead>
            <tr id="stats-thead-row">
              <th>Activity</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="stats-tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Section 3: Login activity -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Login Activity</span>
    </div>
    <div class="section-body">
      <div id="login-loading" class="loading">Loading...</div>
      <div id="login-content" style="display:none">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('daily', this)">Daily (last 30 days)</button>
          <button class="tab-btn" onclick="switchTab('weekly', this)">Weekly (last 12 weeks)</button>
          <button class="tab-btn" onclick="switchTab('monthly', this)">Monthly (last 12 months)</button>
        </div>
        <div id="tab-daily" class="tab-panel active">
          <div id="chart-daily" class="bar-chart"></div>
          <table id="table-daily"><thead></thead><tbody></tbody></table>
        </div>
        <div id="tab-weekly" class="tab-panel">
          <div id="chart-weekly" class="bar-chart"></div>
          <table id="table-weekly"><thead></thead><tbody></tbody></table>
        </div>
        <div id="tab-monthly" class="tab-panel">
          <div id="chart-monthly" class="bar-chart"></div>
          <table id="table-monthly"><thead></thead><tbody></tbody></table>
        </div>
      </div>
    </div>
  </div>

</div><!-- /page -->

<!-- Create User Modal -->
<div class="modal-overlay" id="create-modal">
  <div class="modal">
    <div class="modal-title">Create User</div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="new-username" placeholder="e.g. alice" autocomplete="off">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="new-password" placeholder="Password">
    </div>
    <div class="form-group">
      <label>Groups</label>
      <div class="checkbox-group">
        <label class="check-chip" id="chip-user">
          <input type="checkbox" value="user" checked onchange="toggleChip(this)"> user
        </label>
        <label class="check-chip checked" id="chip-admin-create">
          <input type="checkbox" value="admin" onchange="toggleChip(this)"> admin
        </label>
      </div>
    </div>
    <div class="error-text" id="create-error"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeCreateModal()">Cancel</button>
      <button class="btn btn-primary" onclick="createUser()">Create</button>
    </div>
  </div>
</div>

<script>
const ME = {{ current_user | tojson }};
const ACTIVITIES = ['alcohol', 'fitness', 'bike_ride', 'coke', 'hike', 'swimming', 'custom_entries'];
let usersData = [];
let loginStatsData = {};

// ── Init ──────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', () => {
  loadUsers();
  loadLoginStats();
});

// ── Users ─────────────────────────────────────────────────────────────────────

async function loadUsers() {
  const res = await fetch('/admin/users');
  if (!res.ok) { document.getElementById('users-loading').textContent = 'Error loading users.'; return; }
  usersData = await res.json();
  renderUsersTable();
  renderStatsTable();
  document.getElementById('users-loading').style.display = 'none';
  document.getElementById('users-table-wrap').style.display = 'block';
  document.getElementById('stats-loading').style.display = 'none';
  document.getElementById('stats-table-wrap').style.display = 'block';
}

function renderUsersTable() {
  const tbody = document.getElementById('users-tbody');
  tbody.innerHTML = '';
  for (const u of usersData) {
    const tr = document.createElement('tr');
    tr.id = `row-${u.username}`;
    tr.innerHTML = `
      <td><strong>${esc(u.username)}</strong>${u.username === ME ? ' <span style="font-size:10px;color:var(--text-muted)">(you)</span>' : ''}</td>
      <td>${renderBadges(u.groups)}</td>
      <td>${u.total_entries}</td>
      <td>${u.login_count}</td>
      <td>${u.last_login || '—'}</td>
      <td>
        <div class="action-group">
          <button class="btn btn-sm" onclick="toggleResetForm('${esc(u.username)}')">Reset Password</button>
          <button class="btn btn-sm btn-danger" onclick="deleteEntries('${esc(u.username)}')">Delete All Entries</button>
          <button class="btn btn-sm btn-danger" onclick="deleteUser('${esc(u.username)}')" ${u.username === ME ? 'disabled title="Cannot delete yourself"' : ''}>Delete User</button>
        </div>
        <div class="reset-form" id="reset-form-${esc(u.username)}">
          <input type="password" id="reset-pw-${esc(u.username)}" placeholder="New password">
          <button class="btn btn-sm btn-primary" onclick="doResetPassword('${esc(u.username)}')">Save</button>
          <button class="btn btn-sm" onclick="toggleResetForm('${esc(u.username)}')">Cancel</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  }
}

function renderBadges(groups) {
  return groups.map(g => `<span class="badge badge-${g === 'admin' ? 'admin' : 'user'}">${esc(g)}</span>`).join('');
}

function renderStatsTable() {
  // Build user list from usersData
  const usernames = usersData.map(u => u.username);
  // Thead
  const theadRow = document.getElementById('stats-thead-row');
  theadRow.innerHTML = '<th>Activity</th><th>Total</th>';
  for (const u of usernames) {
    const th = document.createElement('th');
    th.textContent = u;
    theadRow.appendChild(th);
  }
  const tbody = document.getElementById('stats-tbody');
  tbody.innerHTML = '';
  const grandTotal = { total: 0 };
  for (const u of usernames) grandTotal[u] = 0;

  for (const act of ACTIVITIES) {
    const tr = document.createElement('tr');
    let total = 0;
    for (const u of usersData) total += (u.per_activity[act] || 0);
    let cells = `<td>${esc(act.replace('_', ' '))}</td><td>${total}</td>`;
    for (const u of usernames) {
      const cnt = usersData.find(x => x.username === u)?.per_activity[act] || 0;
      cells += `<td>${cnt > 0 ? cnt : '<span style="color:var(--text-muted)">—</span>'}</td>`;
      grandTotal[u] += cnt;
    }
    tr.innerHTML = cells;
    tbody.appendChild(tr);
    grandTotal.total += total;
  }
  // Grand total row
  const trTotal = document.createElement('tr');
  trTotal.className = 'total-row';
  let totalCells = `<td>Grand Total</td><td>${grandTotal.total}</td>`;
  for (const u of usernames) totalCells += `<td>${grandTotal[u]}</td>`;
  trTotal.innerHTML = totalCells;
  tbody.appendChild(trTotal);
}

// ── User actions ──────────────────────────────────────────────────────────────

function toggleResetForm(username) {
  const form = document.getElementById(`reset-form-${username}`);
  form.classList.toggle('open');
}

async function doResetPassword(username) {
  const pw = document.getElementById(`reset-pw-${username}`).value.trim();
  if (!pw) { alert('Please enter a new password.'); return; }
  const res = await fetch(`/admin/users/${encodeURIComponent(username)}/reset_password`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  });
  if (res.ok) {
    toggleResetForm(username);
    document.getElementById(`reset-pw-${username}`).value = '';
    showToast('Password updated.');
  } else {
    const d = await res.json();
    alert('Error: ' + (d.error || 'Unknown error'));
  }
}

async function deleteEntries(username) {
  if (!confirm(`Delete ALL entries for "${username}"? This cannot be undone.`)) return;
  const res = await fetch(`/admin/users/${encodeURIComponent(username)}/entries`, { method: 'DELETE' });
  if (res.ok) { await loadUsers(); showToast('Entries deleted.'); }
  else { const d = await res.json(); alert('Error: ' + (d.error || 'Unknown')); }
}

async function deleteUser(username) {
  if (!confirm(`Delete user "${username}" and ALL their data? This cannot be undone.`)) return;
  const res = await fetch(`/admin/users/${encodeURIComponent(username)}`, { method: 'DELETE' });
  if (res.ok) { await loadUsers(); showToast('User deleted.'); }
  else { const d = await res.json(); alert('Error: ' + (d.error || 'Unknown')); }
}

// ── Create user modal ─────────────────────────────────────────────────────────

function openCreateModal() {
  document.getElementById('new-username').value = '';
  document.getElementById('new-password').value = '';
  document.getElementById('create-error').style.display = 'none';
  // Reset checkboxes
  document.querySelectorAll('#create-modal .check-chip input').forEach(cb => {
    cb.checked = cb.value === 'user';
    cb.closest('.check-chip').classList.toggle('checked', cb.value === 'user');
  });
  document.getElementById('create-modal').classList.add('open');
}

function closeCreateModal() {
  document.getElementById('create-modal').classList.remove('open');
}

function toggleChip(cb) {
  cb.closest('.check-chip').classList.toggle('checked', cb.checked);
}

async function createUser() {
  const username = document.getElementById('new-username').value.trim().toLowerCase();
  const password = document.getElementById('new-password').value;
  const groups = Array.from(document.querySelectorAll('#create-modal .check-chip input'))
    .filter(cb => cb.checked).map(cb => cb.value);
  const errEl = document.getElementById('create-error');
  if (!username || !password) { errEl.textContent = 'Username and password are required.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';
  const res = await fetch('/admin/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, groups })
  });
  if (res.ok) {
    closeCreateModal();
    await loadUsers();
    showToast('User created.');
  } else {
    const d = await res.json();
    errEl.textContent = d.error || 'Error creating user.';
    errEl.style.display = 'block';
  }
}

// Close modal on backdrop click
document.getElementById('create-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCreateModal();
});

// ── Login stats ───────────────────────────────────────────────────────────────

async function loadLoginStats() {
  const res = await fetch('/admin/login_stats');
  if (!res.ok) { document.getElementById('login-loading').textContent = 'Error loading login stats.'; return; }
  loginStatsData = await res.json();
  document.getElementById('login-loading').style.display = 'none';
  document.getElementById('login-content').style.display = 'block';
  renderLoginTab('daily');
  renderLoginTab('weekly');
  renderLoginTab('monthly');
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
}

function renderLoginTab(period) {
  const data = loginStatsData[period] || [];
  // Bar chart
  const chartEl = document.getElementById(`chart-${period}`);
  chartEl.innerHTML = '';
  const maxTotal = Math.max(1, ...data.map(d => d.total));
  const BAR_MAX_PX = 56; // px for max bar
  for (const item of data) {
    const col = document.createElement('div');
    col.className = 'bar-col';
    const pct = item.total / maxTotal;
    const px = Math.max(item.total > 0 ? 2 : 0, Math.round(pct * BAR_MAX_PX));
    // label above
    const countDiv = document.createElement('div');
    countDiv.className = 'bar-count';
    countDiv.textContent = item.total > 0 ? item.total : '';
    // bar
    const bar = document.createElement('div');
    bar.className = 'bar-fill' + (item.total === 0 ? ' zero' : '');
    bar.style.height = (item.total === 0 ? 2 : px) + 'px';
    bar.title = `${item.period}: ${item.total} login${item.total !== 1 ? 's' : ''}`;
    // date label below
    const labelDiv = document.createElement('div');
    labelDiv.className = 'bar-label';
    // Shorten label for readability
    let lbl = item.period;
    if (period === 'daily') lbl = item.period.slice(5); // MM-DD
    else if (period === 'weekly') lbl = item.period.replace(/\d{4}-/, ''); // W##
    else lbl = item.period.slice(0, 7); // YYYY-MM
    labelDiv.textContent = lbl;
    col.appendChild(countDiv);
    col.appendChild(bar);
    col.appendChild(labelDiv);
    chartEl.appendChild(col);
  }

  // Table
  const tableEl = document.getElementById(`table-${period}`);
  // Collect all usernames
  const allUsers = new Set();
  data.forEach(d => Object.keys(d.per_user || {}).forEach(u => allUsers.add(u)));
  const userList = Array.from(allUsers).sort();

  let thead = '<tr><th>Period</th><th>Total</th>';
  for (const u of userList) thead += `<th>${esc(u)}</th>`;
  thead += '</tr>';

  let tbody = '';
  for (const item of data) {
    let row = `<tr><td>${esc(item.period)}</td><td>${item.total}</td>`;
    for (const u of userList) {
      const cnt = item.per_user?.[u] || 0;
      row += `<td>${cnt > 0 ? cnt : '<span style="color:var(--text-muted)">—</span>'}</td>`;
    }
    row += '</tr>';
    tbody += row;
  }

  tableEl.innerHTML = `<thead>${thead}</thead><tbody>${tbody}</tbody>`;
}

// ── Utility ───────────────────────────────────────────────────────────────────

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg) {
  const el = document.createElement('div');
  el.textContent = msg;
  Object.assign(el.style, {
    position: 'fixed', bottom: '24px', right: '24px', background: '#238636',
    color: '#fff', padding: '10px 18px', borderRadius: '6px', fontSize: '13px',
    fontWeight: '600', zIndex: '9999', boxShadow: '0 4px 12px rgba(0,0,0,0.4)'
  });
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2800);
}
</script>
</body>
</html>
